<form #sensorFormRef="ngForm" class="form">
  <div class="form-group">
    <label for="sensorTitle">Sensör Adı</label>
    <input
      id="sensorTitle"
      type="text"
      name="title"
      required
      pattern="^[a-zA-ZğüşöçıİĞÜŞÖÇ\s]+$"
      minlength="3"
      [(ngModel)]="formData.title"
      #title="ngModel"
      (keydown.enter)="focusNext($event)"
    />
    <div *ngIf="title.invalid && title.touched" class="alert">
        <div *ngIf="title.hasError('required')">
            Sensör adı bilgisi zorunludur!
        </div>
        <div *ngIf="title.hasError('pattern')">
            Sensör adı sadece harflerden oluşmalıdır!
        </div>
        <div *ngIf="title.hasError('minlength')">
            Sensör adı en az 3 karakterden oluşmalıdır!
        </div>
    </div>
</div>

  <div class="form-group">
    <label for="sensorType">Sensör Tipi</label>
    <input
      id="sensorType"
      type="text"
      name="type"
      required
      minlength="3"
      [(ngModel)]="formData.type"
      #type="ngModel"
      (keydown.enter)="focusNext($event)"
    />
    <div *ngIf="type.invalid && type.touched" class="alert">
      <div *ngIf="type.hasError('required')">
        Sensör tip bilgisi zorunludur!
      </div>
      <div *ngIf="type.hasError('minlength')">
        Sensör tipi en az 3 karakterden oluşmalıdır!
      </div>
    </div>
  </div>

  <div class="form-group">
    <label for="sensorRoom">Oda Seç</label>
    <select
      id="sensorRoom"
      name="sensorRoom"
      class="room-select"
      required
      [(ngModel)]="formData.sensorRoom"
      #sensorRoom="ngModel"
      (keydown.enter)="focusNext($event)"
    >
      <option [ngValue]="null" disabled>Oda seçiniz</option>
      <option *ngFor="let room of rooms" [ngValue]="room.id">
        {{ room.title }}
      </option>
    </select>

    <div *ngIf="sensorRoom.invalid && sensorRoom.touched" class="alert">
      Henüz bir oda seçmediniz!
    </div>
  </div>

  <div class="form-group">
    <label for="sensorX">x (sol-üst)</label>
    <input
      id="sensorX"
      type="number"
      name="x"
      required
      [(ngModel)]="formData.x"
      #x="ngModel"
      (keydown.enter)="focusNext($event)"
    />
    <div *ngIf="x.invalid && x.touched" class="alert">
      <div *ngIf="x.hasError('required')">
        x koordinat bilgisi zorunludur!
      </div>
    </div>
  </div>

  <div class="form-group">
    <label for="sensorY">y (sol-üst)</label>
    <input
      id="sensorY"
      type="number"
      name="y"
      required
      [(ngModel)]="formData.y"
      #y="ngModel"
      (keydown.enter)="focusNext($event)"
    />
    <div *ngIf="y.invalid && y.touched" class="alert">
      <div *ngIf="y.hasError('required')">
        y koordinat bilgisi zorunludur!
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="save-button" (click)="onSubmit()">
      {{ submitLabel }}
    </button>
    <button type="button" class="cancel-button" (click)="cancel.emit()">
      İptal
    </button>
  </div>
</form>
