<div class="modal-overlay" *ngIf="isOpen">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">{{ title }}</h2>

      <button
        type="button"
        class="close-button"
        (click)="close.emit()"
        aria-label="Kapat"
      >
        ×
      </button>
    </div>

    <div class="modal-body">
      <ng-content></ng-content>
    </div>
  </div>
</div>
